name: Unit Test

on:
  push:
    paths-ignore:
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: python
        run: pip install -e ".[dev]"
      - name: Run tests
        working-directory: python
        run: pytest --tb=short -q
      - name: Summary
        if: always()
        run: echo "### Python Tests" >> $GITHUB_STEP_SUMMARY

  rust:
    name: Rust
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          cache-on-failure: true
      - name: Run tests
        working-directory: rust
        run: cargo test --all

  go:
    name: Go
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go/go.sum
      - name: Run tests
        working-directory: go
        run: go test ./...

  javascript:
    name: JavaScript
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: javascript/package-lock.json
      - name: Install dependencies
        working-directory: javascript
        run: npm ci
      - name: Run tests
        working-directory: javascript
        run: npm test

  java:
    name: Java
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven
      - name: Run tests
        working-directory: java
        run: mvn test -q

  csharp:
    name: C#
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"
      - name: Run tests
        working-directory: csharp
        run: dotnet test
